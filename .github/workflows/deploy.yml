name: CI Build

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Deploy para GitHub Pages desativado — Cloudflare Pages (pre-flop-pro.pages.dev) é o deploy principal
